<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SST距平分析 · 全球海洋大气耦合时空可视分析系统</title>
  <link rel="stylesheet" href="/static/css/global.css" />
  <link rel="stylesheet" href="/static/css/nav.css" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <!-- ===================== 顶部：时间轴筛选条 ===================== -->
  <header class="topbar">
    <div class="timeline">
      <div class="tl-row">
        <label>时间范围</label>
        <span id="tlStart" class="tl-val">--</span>
        <input id="rangeStart" type="range" min="0" max="0" value="0" />
        <input id="rangeEnd" type="range" min="0" max="0" value="0" />
        <span id="tlEnd" class="tl-val">--</span>
      </div>
      <div class="tl-row presets">
        <button data-preset="all" class="active">全量</button>
        <button data-preset="2020">2020</button>
        <button data-preset="2021">2021</button>
        <button data-preset="2022">2022</button>
        <button data-preset="enso" title="2021下半年拉尼娜冷事件窗口">ENSO窗口</button>
        <button id="playBtn" title="按月滚动播放">▶ 播放</button>
        <span class="status" id="statusBar">就绪</span>
      </div>
    </div>
  </header>

  <!-- ===================== 主体：四图布局 ===================== -->
  <main class="grid">
    <!-- 左上：折线图 -->
    <section class="panel">
      <div class="panel-hd">
        <h2>① SST 距平时间趋势</h2>
        <small>各海域月均 SST 距平 · 地图点击区域→聚焦该海域 · 框选时段→联动下方图表</small>
      </div>
      <div id="lineChart" class="chart"></div>
    </section>

    <!-- 右上：地理热力图（主图） -->
    <section class="panel">
      <div class="panel-hd">
        <h2>② 全球海表温度空间分布（主图）</h2>
        <small>颜色=SST 距平 · 点击站点→下钻详情&聚焦海域 · 散点框选→此处高亮</small>
      </div>
      <div id="geoChart" class="chart"></div>
    </section>

    <!-- 左下：柱状图 -->
    <section class="panel">
      <div class="panel-hd">
        <h2>③ 各海域月均 OHC 对比</h2>
        <small>海洋热含量代理 (GJ/m²) · 随时间筛选/刷选动态更新</small>
      </div>
      <div id="barChart" class="chart"></div>
    </section>

    <!-- 右下：散点图 -->
    <section class="panel">
      <div class="panel-hd">
        <h2>④ SST 距平 vs 风应力</h2>
        <small>海气耦合关系 · 框选数据点→地图对应位置高亮</small>
      </div>
      <div id="scatterChart" class="chart"></div>
    </section>
  </main>

  <!-- ===================== 右侧：单点查询详情面板 ===================== -->
  <aside id="detailPanel" class="detail hidden">
    <div class="detail-hd">
      <h3>站点详情 · 低级查询</h3>
      <button id="detailClose">×</button>
    </div>
    <div id="detailBody"></div>
  </aside>

  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <script src="/static/js/config.js"></script>
  <script src="/static/js/nav.js"></script>
  <script src="/static/js/main.js"></script>
</body>
</html>
